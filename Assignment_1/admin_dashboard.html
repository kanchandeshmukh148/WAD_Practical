<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            overflow-x: hidden;
        }
        .sidebar {
            height: 100vh;
            background-color: #343a40;
            color: white;
        }
        .sidebar a {
            color: white;
            display: block;
            padding: 10px;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #495057;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <nav class="col-md-2 d-none d-md-block sidebar">
            <h4 class="text-center py-3">Dashboard</h4>
            <a href="#">Home</a>
            <a href="#">Students</a>
            <a href="#">Exams</a>
            <a href="#">Results</a>
            <a href="#">Settings</a>
        </nav>

        <!-- Main Content -->
        <main class="col-md-10 ms-sm-auto px-md-4">
            <h2 class="mt-4">Admin Dashboard</h2>

            <!-- Cards -->
            <div class="row mt-4">
                <div class="col-md-3 mb-3">
                    <div class="card text-white bg-primary p-3">
                        <h5>Total Students</h5>
                        <h2>1200</h2>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card text-white bg-success p-3">
                        <h5>Exams Conducted</h5>
                        <h2>45</h2>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card text-white bg-warning p-3">
                        <h5>Results Published</h5>
                        <h2>30</h2>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card text-white bg-danger p-3">
                        <h5>Pending Tasks</h5>
                        <h2>8</h2>
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="card mt-4">
                <div class="card-header">
                    Recent Activities
                </div>
                <div class="card-body">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Activity</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>Exam Created</td>
                                <td>01 Apr 2026</td>
                            </tr>
                            <tr>
                                <td>2</td>
                                <td>Results Uploaded</td>
                                <td>03 Apr 2026</td>
                            </tr>
                            <tr>
                                <td>3</td>
                                <td>New Student Registered</td>
                                <td>05 Apr 2026</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
