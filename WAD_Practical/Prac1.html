<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f1f1f1;
}
.sidebar{
height:100vh;
background:#212529;
color:white;
padding:20px;
}
.card{
border:none;
border-radius:10px;
}
</style>

</head>

<body>

<div class="container-fluid">
<div class="row">

<div class="col-md-2 sidebar">
<h3>Admin</h3>
<hr>
<p>Dashboard</p>
<p>Users</p>
<p>Orders</p>
<p>Settings</p>
</div>

<div class="col-md-10 p-4">

<h2>Dashboard</h2>

<div class="row mt-4">

<div class="col-md-4">
<div class="card bg-primary text-white p-3">
<h4>Users</h4>
<h2>120</h2>
</div>
</div>

<div class="col-md-4">
<div class="card bg-success text-white p-3">
<h4>Orders</h4>
<h2>80</h2>
</div>
</div>

<div class="col-md-4">
<div class="card bg-danger text-white p-3">
<h4>Revenue</h4>
<h2>$500</h2>
</div>
</div>

</div>
</div>

</div>
</div>

</body>
</html>
