<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Hotel</h2>
        <ul>
            <li onclick="goDashboard()">🏠 Dashboard</li>
            <li onclick="goBooking()">📅 Bookings</li>
            <li onclick="logout()">🚪 Logout</li>
        </ul>
    </div>

    <!-- Content -->
    <div class="content">

        <!-- Header -->
        <div class="header">
            <h2>Welcome to Dashboard</h2>
        </div>

        <!-- Stats Cards -->
        <div class="cards">
            <div class="card-box">
                <h3 id="totalBookings">0</h3>
                <p>Total Bookings</p>
            </div>

            <div class="card-box">
                <h3 id="totalRooms">0</h3>
                <p>Rooms Booked</p>
            </div>

            <div class="card-box">
                <h3>Available</h3>
                <p>Status</p>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="actions">
            <button onclick="goBooking()">➕ Add Booking</button>
            <button onclick="goBooking()">📋 View Bookings</button>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
